<html>

<head>
	<title>MiniWEB</title>
	
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<!-- Load the main MDS JS lib -->
	<script type="text/javascript" src="mds.js"></script>
	
	<!-- And the ICON for the page -->
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	
	<!--  JQUERY CSS + JS -->
	<link rel="stylesheet" href="./root/miniweb/libs/jquery/jquery-ui-1.14.1/jquery-ui.css">
	<link rel="stylesheet" href="./root/miniweb/libs/jquery/jquery-ui-1.14.1/jquery-ui.icon-font.css">
	<script type="text/javascript" src="./root/miniweb/libs/jquery/jquery-3.7.1.min.js"></script>
	<script type="text/javascript" src="./root/miniweb/libs/jquery/jquery-ui-1.14.1/jquery-ui.js"></script>
	
	<!-- JS -->
	<script type="text/javascript" src="./js/jszip.min.js"></script>
	<script type="text/javascript" src="./js/ziputil.js"></script>
	<script type="text/javascript" src="./js/jslib.js"></script>
	<script type="text/javascript" src="./js/mimetypes.js"></script>
	<script type="text/javascript" src="./js/sql.js"></script>
	<script type="text/javascript" src="./js/gui.js"></script>
	
	<!-- Load shared gui.js for theme toggle -->
	<script type="text/javascript" src="./js/gui.js"></script>

	<style type="text/css">

		@font-face {
			font-family: Manrope;
			src: url('./root/miniweb/fonts/Manrope-Regular.ttf');
		}

		:root {
			--browse-bg: #1a1a1a;
			--browse-surface: #2b2b2b;
			--browse-border: #3a3a3a;
			--browse-text: #d4d4d4;
			--browse-text-secondary: #b0b0b0;
			--browse-hover: #3d3d3d;
			--browse-active: #4a4a4a;
			--browse-accent: #5b8def;
			--browse-accent-glow: rgba(91,141,239,0.15);
		}

		[data-theme="light"] {
			--browse-bg: #e8e8ec;
			--browse-surface: #ffffff;
			--browse-border: #d0d0d4;
			--browse-text: #1c1c1e;
			--browse-text-secondary: #6b6b70;
			--browse-hover: #f0f0f2;
			--browse-active: #e4e4e7;
			--browse-accent: #4a7be0;
			--browse-accent-glow: rgba(74,123,224,0.15);
		}

		body {
			margin: 0 auto;
			padding: 0;
			width: 100%;
			height: 100%;
			font-family: Manrope, system-ui, sans-serif;
			background: var(--browse-bg);
			overflow: hidden;
		}

		.mainiframe {
			margin: 0 auto;
			padding: 0;
			width: 100%;
			height: calc(100vh - 86px);
			margin-top: 86px;
			background: #f5f5f5;
		}

		.minimenu {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			background-color: var(--browse-surface);
			display: block;
			z-index: 10;
			border-bottom: 1px solid var(--browse-border);
			border-radius: 0;
			font-family: Manrope, system-ui, sans-serif;
			font-size: 14px;
			width: 100%;
			max-width: none;
		}

		.addressbar {
			font-family: Manrope, system-ui, sans-serif;
			font-size: 13px;
			width: 100%;
			height: 32px;
			background: var(--browse-bg);
			color: var(--browse-text);
			border: 1px solid var(--browse-border);
			border-radius: 8px;
			padding: 0 14px;
			outline: none;
		}
		.addressbar:focus {
			border-color: var(--browse-accent);
			box-shadow: 0 0 0 2px var(--browse-accent-glow);
		}

		select.addressbar {
			background: var(--browse-bg);
			color: var(--browse-text);
			border: 1px solid var(--browse-border);
			border-radius: 6px;
			padding: 4px 10px;
			height: 30px;
		}

		.simplebutton {
			min-width: 60;
		}

		/* Hide the toggle button — toolbar always visible like a real browser */
		#toggleview {
			display: none !important;
		}

		.ui-icon {
			zoom: 150%;
			color: var(--browse-accent);
		}

		.ui-button {
			font-family: Manrope, system-ui, sans-serif !important;
			font-size: 13px !important;
			background: transparent !important;
			border: none !important;
			border-radius: 6px !important;
			color: var(--browse-text-secondary) !important;
			padding: 4px 8px !important;
			min-height: 30px !important;
			transition: background 120ms ease, color 120ms ease !important;
		}
		.ui-button:hover {
			background: var(--browse-hover) !important;
			color: var(--browse-text) !important;
		}
		.ui-button:active {
			background: var(--browse-active) !important;
			color: var(--browse-text) !important;
		}

		.ui-widget {
			font-family: Manrope, system-ui, sans-serif !important;
		}
		.ui-widget-content {
			border: 1px solid var(--browse-border) !important;
			background: var(--browse-surface) !important;
			color: var(--browse-text) !important;
		}

		.theme-toggle {
			background: transparent;
			border: none;
			cursor: pointer;
			padding: 4px 6px;
			border-radius: 6px;
			font-size: 16px;
			line-height: 1;
			transition: background 120ms ease;
			color: var(--browse-text-secondary);
			vertical-align: middle;
		}
		.theme-toggle:hover {
			background: var(--browse-hover);
		}

	</style>
	
</head>

<body>

<!--  The MAIN address bar and bookmarks view -->
<div class="minimenu" id=webfull>
   <table border=0 width=100%>
		<tr>
			<td width=100%>
				<table id=mainbuttons width=100% border=0>
			   		<tr>
			   			<td><button id=homebutton>Home</button></td>
			   			<td><button id=backbutton>Back</button></td>
			   			<td  width=100%><input class=addressbar type=text id=mxaddress></td>
			   			<td><button id=gobutton>Go</button></td>
			   			<td><button id=refreshbutton>Refresh</button></td>
			<td><button id=forcerefreshbutton>Force Refresh</button></td>
			   			<td><button id="theme-toggle" class="theme-toggle" onclick="toggleTheme();" title="Switch to light mode">&#9728;</button></td>
			   		</tr>
				   	<tr>
						 <td>
						 	<button id=addbookmark>Add Bookmark</button>
						 </td>
						 <td  width=100% colspan=3>
							<select id=bookmarkbar class=addressbar style="width:100%" onchange="bookmkchange();"></select>
						 </td>
						 <td>
						 	<button id=rembook>Remove Bookmark</button>
						 </td>
					</tr>   	
			   </table>		
			</td>
			<td>
				<button style="width:50;height:70" id=toggleview>Toggle Control Panel</button>
			</td>	
		</tr>
   </table>
   
</div>

<iframe class="mainiframe" id="webframe" frameborder="0"  
		sandbox="allow-scripts allow-modals allow-popups allow-popups-to-escape-sandbox" referrerpolicy="no-referrer"></iframe>

<script type="text/javascript">
	
	//Are we in developer mode
	var developermode = false;
	
	//The Current iFrame page
	var IFRAME_PAGE = "";
	var IFRAME_BAR  = "";
	
	var IFRAME_HISTORY = [];
	
	//Set up the JQuery Buttons..
	$(document).ready(function() {
	    
		$( "#toggleview" ).button({
			icon: "ui-icon-transferthick-e-w",
			showLabel: false
		}).click(function(){togglemenu();});
		
		$( "#homebutton" ).button({
			icon: "ui-icon-home",
			showLabel: false
		}).click(function(){goHome();});
		
		$( "#gobutton" ).button({
			icon: "ui-icon-mail-send",
			showLabel: false
		}).click(function(){gobar();});
		
		$( "#backbutton" ).button({
			icon: "ui-icon-arrowthick-1-w",
			showLabel: false
		}).click(function(){goBackIFramePage();});
		
		$( "#refreshbutton" ).button({
			icon: "ui-icon-refresh",
			showLabel: false
		}).click(function(){refreshIFramePage();});

		$( "#forcerefreshbutton" ).button({
			icon: "ui-icon-arrowrefresh-1-e",
			showLabel: false
		}).click(function(){forceRefreshPage();});
		
		$( "#addbookmark" ).button({
			icon: "ui-icon-circle-plus",
			showLabel: false
		}).click(function(){addBookmark();});
		
		$( "#rembook" ).button({
			icon: "ui-icon-circle-minus",
			showLabel: false
		}).click(function(){remBookmark();});
	});
	
	var goright = true;
	function togglemenu(){
		
		//Get the width..
		var ww = $("#mainbuttons").width();
		
		if(goright){
			$("#webfull").animate({left: ww*-1+'px'});	
		}else{
			$("#webfull").animate({left: '4px'});
		}
		
		goright = !goright;
	}
	
	function addBookmark(){
		var bookmk   = mxaddress.value; 
		var name     = prompt(bookmk+"\n\nBookmark name ?\n","");
		if(name != null){
			name = name.trim();
			if(name != ""){
				insertBookMark(name,bookmk, function(){
					loadBookmarks();
				});	
			}
		}
	}
	
	function remBookmark(){
		//remove the currently selected
		var id 		= bookmarkbar.selectedIndex;
		var text 	= bookmarkbar.options[id].text;
		var value 	= bookmarkbar.options[id].value;
		
		if(value == ""){
			return;
		}
		
		if(confirm("This will remove the "+text+" bookmark ?")){
			deleteBookmark(text,function(){
				loadBookmarks();
			});	
		}
	}
	
	function gobar(){
		//Get the address.. and go there
		go(mxaddress.value);
	}
	
	function loadBookmarks(){
		
		//Clear thge bookmarks
		bookmarkbar.innerHTML = "";
	
		var opt 		= document.createElement("option");
		opt.value		= "";
	   	opt.innerHTML 	= "Bookmarks : "; // whatever property it has
	   	
	    // then append it to the select element
	    bookmarkbar.appendChild(opt);
	   	
		//Load from SQL
		getAllBookmarks(function(rows){
			//Now add to the select
			var len = rows.length;
			for(var i=0;i<len;i++){
				var opt 		= document.createElement("option");
				opt.value		= rows[i].BOOKMARK;
			   	opt.innerHTML 	= rows[i].NAME; // whatever property it has
	
			   // then append it to the select element
			   bookmarkbar.appendChild(opt);	
			}
		});
	}
	
	function bookmkchange(){
		var id 		= bookmarkbar.selectedIndex;
		var text 	= bookmarkbar.options[id].text;
		var value 	= bookmarkbar.options[id].value;
		if(value != ""){
			go(value);	
		}
	}
	
	//Add a page to our simple history mechanic..
	function newIFramePage(page){
		
		//Store for later
		IFRAME_PAGE = page;
		IFRAME_BAR	= mxaddress.value.trim();
		
		var bkunit 	= {};
		bkunit.page = IFRAME_PAGE;
		bkunit.bar  = IFRAME_BAR
		
		//Keep a total History..
		var histlen = IFRAME_HISTORY.length;
		if(histlen == 0){
			IFRAME_HISTORY.push(bkunit);
		}else{
			var lastelem = IFRAME_HISTORY[histlen-1];
			if(lastelem.page != page){
				IFRAME_HISTORY.push(bkunit);
			}
		}
	}
	
	function refreshIFramePage(){
		var histlen = IFRAME_HISTORY.length;
		if(histlen == 0){
			go(lastgo);
		}else{
			//Load the last valid page..
			webframe.src 	= IFRAME_PAGE;
			mxaddress.value = IFRAME_BAR;
		}
	}

	function forceRefreshPage(){
		var domain = mxaddress.value.trim();
		if(domain == ""){
			if(lastgo != ""){
				domain = lastgo;
			}else{
				alert("No site to refresh");
				return;
			}
		}

		if(domain.startsWith("miniweb://")){
			domain = domain.substring(10);
		}
		if(domain.endsWith("/")){
			domain = domain.substring(0, domain.length-1);
		}

		var basedomain = getBaseDomain(domain);
		var webfolder = addDomains(BASE_WEB, basedomain);
		var internalfolder = addDomains(BASE_INTERNAL, basedomain);

		MDS.log("Force refresh: clearing all caches for " + basedomain);

		// Show loading page
		loadPage("loading.html", function(){

			// 1. Clear PocketWeb's extracted files
			MDS.file.deletefromweb(webfolder, function(){
				MDS.file.delete(internalfolder, function(){

					// 2. Tell pocketFS to delete its cached ZIP and re-request from network
					var api = {};
					api.action = "REFRESH";
					api.data = basedomain;

					MDS.api.call("pocketfs", JSON.stringify(api), function(resp){

						MDS.log("pocketFS REFRESH response: " + JSON.stringify(resp));

						// 3. Now poll pocketFS until the fresh data arrives
						var attempts = 0;
						var maxAttempts = 30;

						function pollForData(){
							attempts++;
							MDS.log("Polling for fresh data, attempt " + attempts + "...");

							loadFilePacket(domain, function(loaded, minifsfound, requested){
								if(loaded){
									var finalpage = addDomains(BASE_WEB, domain);
									if(!finalpage.includes(".html")){
										finalpage = addDomains(finalpage, "index.html");
									}
									loadPage(finalpage);
								}else if(attempts < maxAttempts){
									setTimeout(pollForData, 2000);
								}else{
									MDS.log("Force refresh timed out after " + maxAttempts + " attempts");
									loadPage("loading_notfound.html");
								}
							});
						}

						// Wait a moment for network request to propagate, then start polling
						setTimeout(pollForData, 3000);
					});
				});
			});
		});
	}
	
	function goBackIFramePage(){
		var histlen = IFRAME_HISTORY.length;
		if(histlen <= 1){
			return;
		}
		
		//Jump back one page..
		var backelem = IFRAME_HISTORY[histlen-2];
		
		//Set the page AND ther bar
		webframe.src 	= backelem.page;
		mxaddress.value = backelem.bar;
		
		//Remove the LAST element
		IFRAME_HISTORY.pop();
	}
	
	/**
	 * Main Website functionality!
	 */
	var MAIN_URL = MDS.form.getParams("mxsite");
	
	//Get the current window location
	var mainstartpage 	= ""+window.location;
	var index 			= mainstartpage.indexOf("browse.html");
	MINWEB_PAGE 		= mainstartpage.substring(0,index-1);
	
	//listen for post messages..
	window.onmessage = function(event){
		
		//What was the message
		var msg = event.data;
		if(msg){
			var action = msg.action;
			if(action == "MINIWEB_JUMPTOURL"){
				
				//Tell the iFrame we got the message
				var resp 		= {};
				resp.action 	= "MINIWEB_RESPONSE";
				resp.randid 	= msg.randid;
				resp.data 		= true;
				
				//Post to the iFrame
				document.getElementById('webframe').contentWindow.postMessage(resp,"*");
				
				//And now jump to the page..
				go(msg.data);
					
			}else if(action == "MINIWEB_GETDATAURI"){
				
				//What file
				var domain = msg.data;
				
				//Does site data exists allready..
				webFolderExists(domain, function(exists){
					
					//Do we need to load / extract ?
					if(exists){
						
						//Send them the Data URI
						completeDataURI(domain,msg.randid);
						
					}else{
						
						//Lets load this filepacket
						loadFilePacket(domain,function(loaded, minifsfound, requested){
							
							//Send them the Data URI
							completeDataURI(domain,msg.randid);
						});
					}
				});		
			
			}else if(action == "MINIWEB_LISTALL"){

				//List all minisites via pocketFS API
				var api 	= {};
				api.action 	= "LISTALL";

				MDS.api.call("pocketfs",JSON.stringify(api),function(apiResp){

					var resp 		= {};
					resp.action 	= "MINIWEB_RESPONSE";
					resp.randid 	= msg.randid;

					if(apiResp.status){
						var parsed = JSON.parse(apiResp.data);
						resp.data = { status:true, results: parsed.results || [] };
					}else{
						resp.data = { status:false, results:[] };
					}

					document.getElementById('webframe').contentWindow.postMessage(resp,"*");
				});

			}else if(action == "MINIWEB_SEARCH"){

				//Search minisites via pocketFS API
				var api 	= {};
				api.action 	= "SEARCH";
				api.data 	= msg.data;

				MDS.api.call("pocketfs",JSON.stringify(api),function(apiResp){

					var resp 		= {};
					resp.action 	= "MINIWEB_RESPONSE";
					resp.randid 	= msg.randid;

					if(apiResp.status){
						var parsed = JSON.parse(apiResp.data);
						resp.data = { status:true, results: parsed.results || [] };
					}else{
						resp.data = { status:false, results:[] };
					}

					document.getElementById('webframe').contentWindow.postMessage(resp,"*");
				});

			}else if(action == "MINIWEB_INSTALL_DAPP"){

				//Validate URL - must be HTTPS and end with .zip
				var installUrl = msg.data;
				var installName = msg.name || "Unknown";

				if(!installUrl || !installUrl.startsWith("https://") || !installUrl.endsWith(".zip")){
					var resp 		= {};
					resp.action 	= "MINIWEB_RESPONSE";
					resp.randid 	= msg.randid;
					resp.data 		= { status:false, error:"Invalid URL. Must be HTTPS and end with .zip" };
					document.getElementById('webframe').contentWindow.postMessage(resp,"*");
					return;
				}

				//Confirm with user before installing
				var ok = confirm("Install MiniDapp: " + installName + "?\n\nFrom: " + installUrl);
				if(!ok){
					var resp 		= {};
					resp.action 	= "MINIWEB_RESPONSE";
					resp.randid 	= msg.randid;
					resp.data 		= { status:false, error:"cancelled" };
					document.getElementById('webframe').contentWindow.postMessage(resp,"*");
					return;
				}

				//Download the file
				var savedRandId = msg.randid;
				MDS.file.download(installUrl, function(dlResp){
					if(!dlResp.status){
						var resp 		= {};
						resp.action 	= "MINIWEB_RESPONSE";
						resp.randid 	= savedRandId;
						resp.data 		= { status:false, error:"Download failed" };
						document.getElementById('webframe').contentWindow.postMessage(resp,"*");
						return;
					}

					var filePath = dlResp.response.download.file;

					//Install the MiniDapp
					MDS.cmd("mds action:install file:" + filePath + " trust:read", function(installResp){
						var resp 		= {};
						resp.action 	= "MINIWEB_RESPONSE";
						resp.randid 	= savedRandId;

						if(installResp.status){
							resp.data = { status:true, installed:installResp.response };
						}else{
							resp.data = { status:false, error:"Install failed: " + (installResp.error || "unknown error") };
						}

						document.getElementById('webframe').contentWindow.postMessage(resp,"*");

						//Cleanup downloaded file
						MDS.file.delete(filePath, function(){});
					});
				});

			}else if(action == "MINIWEB_LOCATION"){
				//The current iFrame location
				newIFramePage(msg.data);
			}
		}
	};
	
	function completeDataURI(domain, msgid){
		
		//Load this previously extracted
		loadDataURI(domain, function(found, datauri){
			
			//Tell the iFrame we got the message
			var resp 		= {};
			resp.action 	= "MINIWEB_RESPONSE";
			resp.randid 	= msgid;
			
			var data = {};
			
			if(!found){
				data.found = false;
				data.data  = "data:,";
				
			}else{
				data.found = true;
				data.data  = datauri;
			}
			
			resp.data = data;
			
			//Post to the iFrame
			document.getElementById('webframe').contentWindow.postMessage(resp,"*");
		});
	}
	
	//Listen for when the iFrame has loaded
	var LOAD_CALLBACK = null;
	webframe.addEventListener("load", function() {
		if(LOAD_CALLBACK){
	  		LOAD_CALLBACK();
	  	}
	});
	
	//Load a page in the iFrame
	function loadPage(page, callback){
		
		if(callback){
			LOAD_CALLBACK = callback;
		}else{
			LOAD_CALLBACK = null;
		}
		
		//First add the base page
		var fullpage = addDomains(MINWEB_PAGE,page);
		
		//Now ADD the MDS UID for the restriced MDS
		fullpage = addURLParam(fullpage,"uid",MINIWEB_UID); 
		
		//Set the page
		if(page != "loading.html" && page != "loading_notfound.html"){
			newIFramePage(fullpage);	
		}
		
		//Set the IFrame src
		webframe.src=fullpage;
	}
	
	function goHome(){
		location.href="index.html?uid="+MDS.minidappuid;
	}
	
	var lastgo = "";
	function go(domainreq){
		lastgo = domainreq;
		
		domain = domainreq.trim();
		if(domain == ""){
			MDS.log("Cannot jump to blank domain..");
			return;
		}
		
		if(domain.startsWith("miniweb://")){
			domain = domain.substring(10);
		}
		
		if(domain.endsWith("/")){
			domain = domain.substring(0, domain.length-1);
		}
		
		//MDS.log("Browser GO : "+domain);
		/*var baraddr = domain+"";
		if(!baraddr.startsWith("miniweb://")){
			baraddr = "miniweb://"+baraddr;
		}*/
		mxaddress.value = domain;
		
		//What is the final page
		var finalpage = addDomains(BASE_WEB,domain);
		if(!finalpage.includes(".html")){
			finalpage = addDomains(finalpage,"index.html");
		}
		
		//Does site data exists allready..
		webFolderExists(domain, function(exists){
			
			//Do we need to load / extract ?
			if(exists){
				
				//Just jump straight to page
				loadPage(finalpage);
			}else{
				
				//Extract the repo and then load
				loadPage("loading.html", function(){
					
					//Lets load this filepacket
					loadFilePacket(domain,function(loaded, minifsfound, requested){
						
						if(loaded){
							//Load the final page
							loadPage(finalpage);
						}else{
							if(!minifsfound){
								alert("Could not contact MiniFS MiniDAPP..\n\Is it installed ?");
							}
							
							//Now show the not found load page
							loadPage("loading_notfound.html");
						}
					});	
				});
			}
		});
	}
	
	//Main message handler..
	MDS.init(function(msg){
		if(msg.event == "inited"){

			askNotificationPermission();
			loadTheme();
			
			//Create the DB and load the Bookmarks
			createDB(function(){
				loadBookmarks();
			});
			
			//Get the READ ONLY mode uid
			MDS.cmd("checkmode", function(resp){
				
				//Use this as the UID for websites..
				MINIWEB_UID = resp.response.untrustedmdsuid;
				
				//Are we in DEV mode
				MDS.keypair.get("developermode",function(details){
					
					developermode 	= false;
					if(details.status){
						if(details.value == "true"){
							developermode 	= true;
						}
					}
					
					if(!developermode){
						//Delete all the old sites on refresh..
						MDS.file.deletefromweb(BASE_WEB,function(delweb){
							MDS.file.delete(BASE_INTERNAL,function(del){
								
								MDS.log("Cleared minisite cache..");
								
								//NOW GO..
								go(MAIN_URL);	
							});
						});
					}else{
						MDS.log("Developer Mode : do not clear minisite cache..");
						
						//NOW GO..
						go(MAIN_URL);
					}	
				});
			});
		
		}else if(msg.event == "MDSCOMMS"){
			
			if(msg.data.public && msg.data.minidapp.toLowerCase() == "pocketfs"){
				//MDS.log(JSON.stringify(msg));
				
				try{
					var comms = JSON.parse(msg.data.message);
					
					if(comms.action == "SENDREQ_MAXIMA"){
						showNotification("Sent request over Maxima for : \n\n"+comms.file);
					}else if(comms.action == "SENDREQ_MINIMA"){
						showNotification("Sent request over Minima for : \n\n"+comms.file);
					}else if(comms.action == "SENDREQ_FAIL_READMODE"){
						showNotification("MiniFS cannot request file in READ mode : \n\n"+comms.file);
					}else if(comms.action == "SENDREQ_FAIL_RECENT"){
						showNotification("File already requested recently.. : \n\n"+comms.file);
					}else if(comms.action == "REC_MAXIMA"){
						
						//Go to the last requested page..
						go(lastgo);
						
						//Tell them
						showNotification("Received file over Maxima : \n\n"+comms.file);
					}
					
				}catch(error){
					MDS.log("MDSCOMMS ERROR : "+error)
				}
			}
		}
	});

</script>
