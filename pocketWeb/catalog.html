<html>

<head>
	<title>Catalog — pocketWeb</title>

	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

	<!-- Load the main MDS JS lib -->
	<script type="text/javascript" src="mds.js"></script>

	<!-- And the ICON for the page -->
	<link rel="icon" type="image/x-icon" href="favicon.ico">

	<!-- Load the local JS lib -->
	<script type="text/javascript" src="./js/jslib.js"></script>
	<script type="text/javascript" src="./js/purify.min.js"></script>
	<script type="text/javascript" src="./js/sql.js"></script>
	<script type="text/javascript" src="./js/gui.js"></script>

	<!--  JQUERY CSS + JS -->
	<link rel="stylesheet" href="./root/miniweb/libs/jquery/jquery-ui-1.14.1/jquery-ui.css">
	<link rel="stylesheet" href="./root/miniweb/libs/jquery/jquery-ui-1.14.1/jquery-ui.icon-font.css">
	<script type="text/javascript" src="./root/miniweb/libs/jquery/jquery-3.7.1.min.js"></script>
	<script type="text/javascript" src="./root/miniweb/libs/jquery/jquery-ui-1.14.1/jquery-ui.js"></script>

	<style type="text/css">

		@font-face {
			font-family: Manrope;
			src: url('./root/miniweb/fonts/Manrope-Regular.ttf');
		}

		/* ═══════════════════════════════════════
		   THEME VARIABLES — matches pocketWeb
		   ═══════════════════════════════════════ */
		:root {
			--bg-body: #111113;
			--bg-surface: #18181b;
			--bg-card: #1e1e21;
			--bg-hover: #27272a;
			--bg-active: #333;

			--border: #27272a;
			--border-input: #333;
			--border-hover: #3f3f46;

			--text-primary: #e0e0e0;
			--text-heading: #f0f0f0;
			--text-secondary: #a0a0a0;
			--text-tertiary: #71717a;
			--text-label: #52525b;
			--text-placeholder: #555;

			--accent: #5b8def;
			--accent-hover: #4a7be0;
			--accent-glow: rgba(91,141,239,0.12);
			--accent-dim: rgba(91,141,239,0.06);

			--tile-label: #a1a1aa;
		}

		[data-theme="light"] {
			--bg-body: #f5f5f7;
			--bg-surface: #ffffff;
			--bg-card: #ffffff;
			--bg-hover: #f0f0f2;
			--bg-active: #e4e4e7;

			--border: #e0e0e4;
			--border-input: #d0d0d4;
			--border-hover: #c0c0c4;

			--text-primary: #1c1c1e;
			--text-heading: #111113;
			--text-secondary: #6b6b70;
			--text-tertiary: #8b8b92;
			--text-label: #9a9aa0;
			--text-placeholder: #aaa;

			--accent: #4a7be0;
			--accent-hover: #3b6ad0;
			--accent-glow: rgba(74,123,224,0.15);
			--accent-dim: rgba(74,123,224,0.06);

			--tile-label: #6b6b70;
		}

		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			font-family: Manrope, system-ui, sans-serif;
			background: var(--bg-body);
			color: var(--text-primary);
			min-height: 100vh;
			overflow-x: hidden;
			padding-left: env(safe-area-inset-left);
			padding-right: env(safe-area-inset-right);
			padding-bottom: env(safe-area-inset-bottom);
		}

		/* ═══════════════════════════════════════
		   PAGE LOAD ANIMATION
		   ═══════════════════════════════════════ */
		@keyframes fadeUp {
			from { opacity: 0; transform: translateY(16px); }
			to   { opacity: 1; transform: translateY(0); }
		}
		@keyframes cubeIn {
			from { opacity: 0; transform: scale(0.92) translateY(20px); }
			to   { opacity: 1; transform: scale(1) translateY(0); }
		}

		/* ═══════════════════════════════════════
		   TOP NAV — reuses pocketWeb pattern
		   ═══════════════════════════════════════ */
		.titlebar {
			position: sticky;
			top: 0;
			z-index: 100;
			width: 100%;
			border-bottom: 1px solid var(--border);
			background: var(--bg-surface);
		}
		.topnav-inner {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 10px 20px;
			padding-top: max(10px, env(safe-area-inset-top));
			max-width: 1200px;
			margin: 0 auto;
		}
		.topnav-brand {
			display: flex;
			align-items: center;
			gap: 10px;
		}
		.topnav-brand img { border-radius: 6px; }
		.topnav-brand span {
			font-size: 17px;
			font-weight: 600;
			letter-spacing: -0.3px;
			color: var(--text-heading);
		}
		.topnav-links {
			display: flex;
			gap: 4px;
		}
		.topnav-links .ui-button,
		.topnav-links .ui-button.ui-button-icon-only {
			background: transparent !important;
			border: none !important;
			border-radius: 6px !important;
			color: var(--text-secondary) !important;
			font-size: 13px !important;
			font-weight: 500 !important;
			padding: 6px 14px !important;
			box-shadow: none !important;
			width: auto !important;
			text-indent: 0 !important;
			white-space: nowrap !important;
		}
		.topnav-links .ui-button:hover {
			background: var(--bg-hover) !important;
			color: var(--text-primary) !important;
		}
		.topnav-links .ui-button .ui-icon,
		.topnav-links .ui-button .ui-button-icon {
			display: none !important;
		}
		.theme-toggle {
			background: transparent;
			border: none;
			cursor: pointer;
			padding: 6px 8px;
			border-radius: 6px;
			font-size: 18px;
			line-height: 1;
			transition: background 120ms ease;
			color: var(--text-secondary);
		}
		.theme-toggle:hover { background: var(--bg-hover); }

		/* ═══════════════════════════════════════
		   HEADER SECTION
		   ═══════════════════════════════════════ */
		.catalog-header {
			max-width: 1200px;
			margin: 0 auto;
			padding: 48px 24px 8px;
			animation: fadeUp 0.5s ease both;
		}
		.catalog-title {
			font-size: 32px;
			font-weight: 700;
			letter-spacing: -0.8px;
			color: var(--text-heading);
			margin-bottom: 6px;
		}
		.catalog-title span {
			background: linear-gradient(135deg, #5b8def 0%, #a78bfa 50%, #f472b6 100%);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}
		.catalog-sub {
			font-size: 14px;
			color: var(--text-tertiary);
			margin-bottom: 24px;
		}

		/* ═══════════════════════════════════════
		   TOOLBAR — count + filter
		   ═══════════════════════════════════════ */
		.catalog-toolbar {
			max-width: 1200px;
			margin: 0 auto;
			padding: 0 24px 20px;
			display: flex;
			align-items: center;
			gap: 12px;
			animation: fadeUp 0.5s ease 0.1s both;
		}
		.catalog-count {
			font-size: 13px;
			font-weight: 600;
			color: var(--text-label);
			text-transform: uppercase;
			letter-spacing: 1px;
		}
		.catalog-count b {
			color: var(--accent);
			font-weight: 700;
		}
		.catalog-filter {
			flex: 1;
			max-width: 300px;
			height: 36px;
			padding: 0 14px;
			border: 1px solid var(--border-input);
			border-radius: 8px;
			background: var(--bg-card);
			color: var(--text-primary);
			font-family: Manrope, system-ui, sans-serif;
			font-size: 13px;
			outline: none;
			transition: border-color 150ms ease, box-shadow 150ms ease;
		}
		.catalog-filter::placeholder { color: var(--text-placeholder); }
		.catalog-filter:focus {
			border-color: var(--accent);
			box-shadow: 0 0 0 3px var(--accent-glow);
		}
		.catalog-scan-btn {
			height: 36px;
			padding: 0 16px;
			border: 1px solid var(--border-input);
			border-radius: 8px;
			background: var(--bg-card);
			color: var(--text-secondary);
			font-family: Manrope, system-ui, sans-serif;
			font-size: 13px;
			font-weight: 500;
			cursor: pointer;
			transition: all 150ms ease;
			white-space: nowrap;
		}
		.catalog-scan-btn:hover {
			border-color: var(--accent);
			color: var(--accent);
			background: var(--accent-dim);
		}

		/* ═══════════════════════════════════════
		   CUBE GRID — the main event
		   ═══════════════════════════════════════ */
		.cube-grid {
			max-width: 1200px;
			margin: 0 auto;
			padding: 0 24px 60px;
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
			gap: 16px;
		}

		/* ═══════════════════════════════════════
		   INDIVIDUAL CUBE TILE
		   ═══════════════════════════════════════ */
		.cube {
			position: relative;
			background: var(--bg-card);
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: 20px;
			display: flex;
			flex-direction: column;
			gap: 14px;
			cursor: pointer;
			transition: border-color 200ms ease, transform 200ms ease, box-shadow 200ms ease;
			animation: cubeIn 0.4s ease both;
			overflow: hidden;
		}
		.cube::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 3px;
			border-radius: 14px 14px 0 0;
			opacity: 0;
			transition: opacity 200ms ease;
		}
		.cube:hover {
			border-color: var(--border-hover);
			transform: translateY(-3px);
			box-shadow: 0 8px 24px rgba(0,0,0,0.15);
		}
		.cube:hover::before {
			opacity: 1;
		}

		.cube-top {
			display: flex;
			align-items: flex-start;
			gap: 14px;
		}

		.cube-icon {
			width: 52px;
			height: 52px;
			min-width: 52px;
			border-radius: 13px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 22px;
			font-weight: 700;
			color: #fff;
			position: relative;
			overflow: hidden;
		}
		.cube-icon::after {
			content: '';
			position: absolute;
			inset: 0;
			background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
			border-radius: 13px;
		}

		.cube-meta {
			flex: 1;
			min-width: 0;
		}
		.cube-name {
			font-size: 14px;
			font-weight: 600;
			color: var(--text-heading);
			word-break: break-all;
			line-height: 1.3;
			margin-bottom: 2px;
		}
		.cube-version {
			font-size: 11px;
			color: var(--text-label);
			font-weight: 500;
		}

		.cube-desc {
			font-size: 13px;
			line-height: 1.55;
			color: var(--text-secondary);
			flex: 1;
			/* show up to ~5 lines then fade */
			display: -webkit-box;
			-webkit-line-clamp: 5;
			-webkit-box-orient: vertical;
			overflow: hidden;
		}

		.cube-actions {
			display: flex;
			gap: 8px;
			padding-top: 4px;
			border-top: 1px solid var(--border);
		}
		.cube-btn {
			flex: 1;
			height: 34px;
			border: 1px solid var(--border-input);
			border-radius: 8px;
			background: var(--bg-surface);
			color: var(--text-secondary);
			font-family: Manrope, system-ui, sans-serif;
			font-size: 12px;
			font-weight: 600;
			cursor: pointer;
			transition: all 140ms ease;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 5px;
		}
		.cube-btn:hover {
			border-color: var(--accent);
			color: var(--accent);
			background: var(--accent-dim);
		}
		.cube-btn-browse {
			background: var(--accent);
			border-color: var(--accent);
			color: #fff;
		}
		.cube-btn-browse:hover {
			background: var(--accent-hover);
			border-color: var(--accent-hover);
			color: #fff;
		}

		/* ═══════════════════════════════════════
		   STATES — loading, empty, sentinel
		   ═══════════════════════════════════════ */
		.catalog-loading {
			max-width: 1200px;
			margin: 0 auto;
			padding: 80px 24px;
			text-align: center;
			color: var(--text-tertiary);
			font-size: 14px;
			animation: fadeUp 0.3s ease both;
		}
		@keyframes pulse {
			0%, 100% { opacity: 0.4; }
			50% { opacity: 1; }
		}
		.catalog-loading .dots {
			display: inline-flex;
			gap: 4px;
			margin-left: 6px;
		}
		.catalog-loading .dots span {
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: var(--accent);
			animation: pulse 1.2s ease infinite;
		}
		.catalog-loading .dots span:nth-child(2) { animation-delay: 0.2s; }
		.catalog-loading .dots span:nth-child(3) { animation-delay: 0.4s; }

		.catalog-empty {
			max-width: 1200px;
			margin: 0 auto;
			padding: 80px 24px;
			text-align: center;
			animation: fadeUp 0.4s ease both;
		}
		.catalog-empty-icon {
			font-size: 48px;
			margin-bottom: 16px;
			opacity: 0.3;
		}
		.catalog-empty-text {
			font-size: 15px;
			color: var(--text-tertiary);
			line-height: 1.6;
		}

		.scroll-sentinel {
			height: 1px;
			width: 100%;
		}

		/* ═══════════════════════════════════════
		   RESPONSIVE
		   ═══════════════════════════════════════ */
		@media (max-width: 640px) {
			.cube-grid {
				grid-template-columns: 1fr;
			}
			.catalog-toolbar {
				flex-wrap: wrap;
			}
			.catalog-filter {
				max-width: none;
				flex: 1 1 100%;
				order: 10;
			}
			.catalog-title { font-size: 26px; }
		}

	</style>

</head>

<body>

<!-- ═══ TOP NAV ═══ -->
<div class="titlebar" onclick="showTitleOnAndroid();">
	<div class="topnav-inner">
		<div class="topnav-brand">
			<img height=28 src="browser.png">
			<span>pocketWeb</span>
		</div>
		<div class="topnav-links">
			<button id="button-home">Home</button>
			<button id="button-catalog">Catalog</button>
			<button id="button-mysite">My Site</button>
			<button id="button-dev">Dev</button>
			<button id="button-help">Help</button>
			<button id="theme-toggle" class="theme-toggle" onclick="toggleTheme();" title="Switch to light mode">&#9728;</button>
		</div>
	</div>
</div>

<!-- ═══ HEADER ═══ -->
<div class="catalog-header">
	<div class="catalog-title"><span>Linternet Catalog</span></div>
	<div class="catalog-sub">Every minisite discovered on the network</div>
</div>

<!-- ═══ TOOLBAR ═══ -->
<div class="catalog-toolbar">
	<div class="catalog-count" id="sitecount">Loading...</div>
	<input class="catalog-filter" type="text" id="filterfield" placeholder="Filter by name or description...">
	<button class="catalog-scan-btn" id="rescan" onclick="rescan();">Rescan Chain</button>
</div>

<!-- ═══ CUBE GRID ═══ -->
<div class="cube-grid" id="cubegrid"></div>

<!-- ═══ LOADING STATE ═══ -->
<div class="catalog-loading" id="loadstate">
	Scanning the linternet
	<span class="dots"><span></span><span></span><span></span></span>
</div>

<!-- ═══ SCROLL SENTINEL (for infinite scroll) ═══ -->
<div class="scroll-sentinel" id="sentinel"></div>

<script type="text/javascript">

	//Tile accent colors — same palette as pocketWeb bookmarks
	var CUBE_COLORS = [
		"#5b8def","#e05d44","#48b884","#a855f7",
		"#f59e0b","#ec4899","#14b8a6","#f97316",
		"#6366f1","#06b6d4","#84cc16","#ef4444"
	];

	//All loaded sites
	var ALL_SITES = [];
	//Currently filtered subset
	var FILTERED = [];
	//How many are currently rendered
	var RENDERED = 0;
	//Batch size for infinite scroll
	var BATCH = 24;

	//Set up nav buttons
	$(document).ready(function() {
		startupButtons();
	});

	/* ═══════════════════════════════════════
	   OPEN BROWSER
	   ═══════════════════════════════════════ */
	function openBrowser(mxsite){
		location.href = "browse.html?uid=" + MDS.minidappuid + "&mxsite=" + mxsite;
	}

	/* ═══════════════════════════════════════
	   BOOKMARK MANAGEMENT
	   ═══════════════════════════════════════ */
	function bookmarkSite(name, mxaddr){
		insertBookMark(name, mxaddr, function(){
			MDS.notify("Bookmarked: " + name);
		});
	}

	/* ═══════════════════════════════════════
	   LOAD ALL SITES FROM POCKETFS
	   ═══════════════════════════════════════ */
	function loadAllSites(){

		loadstate.style.display = "block";
		cubegrid.innerHTML = "";
		RENDERED = 0;

		var api 	= {};
		api.action 	= "LISTALL";

		MDS.api.call("pocketfs", JSON.stringify(api), function(resp){

			loadstate.style.display = "none";

			if(resp.status){

				var data = JSON.parse(resp.data);
				ALL_SITES = data.results || [];

				//Sort newest first (highest id = newest)
				//They come in DESC order from the query already

				FILTERED = ALL_SITES.slice();

				sitecount.innerHTML = "<b>" + ALL_SITES.length + "</b> minisites discovered";

				if(ALL_SITES.length == 0){
					showEmpty();
				}else{
					renderBatch();
				}
			}else{
				sitecount.textContent = "Could not reach pocketFS";
				showEmpty();
			}
		});
	}

	/* ═══════════════════════════════════════
	   RESCAN — re-trigger coins scan then reload
	   ═══════════════════════════════════════ */
	function rescan(){
		sitecount.innerHTML = "Rescanning...";
		loadAllSites();
	}

	/* ═══════════════════════════════════════
	   FILTER
	   ═══════════════════════════════════════ */
	filterfield.addEventListener("input", function(){
		var term = filterfield.value.trim().toLowerCase();

		if(term == ""){
			FILTERED = ALL_SITES.slice();
		}else{
			FILTERED = ALL_SITES.filter(function(site){
				var name = (site.data.name || "").toLowerCase();
				var desc = (site.data.description || "").toLowerCase();
				return name.indexOf(term) !== -1 || desc.indexOf(term) !== -1;
			});
		}

		sitecount.innerHTML = "<b>" + FILTERED.length + "</b> of " + ALL_SITES.length + " minisites";

		//Reset grid
		cubegrid.innerHTML = "";
		RENDERED = 0;
		renderBatch();
	});

	/* ═══════════════════════════════════════
	   EMPTY STATE
	   ═══════════════════════════════════════ */
	function showEmpty(){
		cubegrid.innerHTML =
			'<div class="catalog-empty" style="grid-column:1/-1">'
			+ '<div class="catalog-empty-icon">&#127760;</div>'
			+ '<div class="catalog-empty-text">No minisites found yet.<br>Publish a minisite or wait for the network to sync.</div>'
			+ '</div>';
	}

	/* ═══════════════════════════════════════
	   RENDER A BATCH OF CUBES
	   ═══════════════════════════════════════ */
	function renderBatch(){
		var end = Math.min(RENDERED + BATCH, FILTERED.length);

		for(var i = RENDERED; i < end; i++){
			cubegrid.appendChild(createCube(FILTERED[i], i));
		}
		RENDERED = end;
	}

	/* ═══════════════════════════════════════
	   CREATE A SINGLE CUBE ELEMENT
	   ═══════════════════════════════════════ */
	function createCube(site, index){

		var name = site.data.name || "Unknown";
		var desc = site.data.description || "No description";
		var version = site.data.version || 1;
		var color = CUBE_COLORS[index % CUBE_COLORS.length];
		var letter = name.replace("Mx","").charAt(0).toUpperCase();
		if(letter == "2") letter = name.replace("Mx200","").charAt(0).toUpperCase();
		if(!letter || letter == "0") letter = "M";

		//Sanitize
		var safeName = DOMPurify.sanitize(name);
		var safeDesc = DOMPurify.sanitize(desc);

		//Truncate Mx address for display
		var shortName = safeName;
		if(shortName.length > 24){
			shortName = shortName.substring(0,12) + "..." + shortName.substring(shortName.length - 8);
		}

		var cube = document.createElement("div");
		cube.className = "cube";
		cube.style.animationDelay = ((index - (RENDERED || 0)) * 0.04) + "s";

		cube.innerHTML =
			'<div class="cube-top">'
			+ '  <div class="cube-icon" style="background:' + color + '">' + letter + '</div>'
			+ '  <div class="cube-meta">'
			+ '    <div class="cube-name" title="' + safeName + '">' + shortName + '</div>'
			+ '    <div class="cube-version">v' + version + '</div>'
			+ '  </div>'
			+ '</div>'
			+ '<div class="cube-desc">' + safeDesc + '</div>'
			+ '<div class="cube-actions">'
			+ '  <button class="cube-btn cube-btn-bookmark" data-name="' + safeName + '" data-addr="' + safeName + '">Bookmark</button>'
			+ '  <button class="cube-btn cube-btn-browse" data-addr="' + safeName + '">Browse</button>'
			+ '</div>';

		//Top accent bar color
		cube.style.setProperty("--_bar", color);

		//Wire up buttons
		var browseBtn = cube.querySelector(".cube-btn-browse");
		browseBtn.addEventListener("click", function(e){
			e.stopPropagation();
			openBrowser(safeName);
		});

		var bookmarkBtn = cube.querySelector(".cube-btn-bookmark");
		bookmarkBtn.addEventListener("click", function(e){
			e.stopPropagation();
			var bkName = prompt("Bookmark name for\n" + safeName, safeDesc.substring(0,40));
			if(bkName && bkName.trim() !== ""){
				bookmarkSite(bkName.trim(), safeName);
				bookmarkBtn.textContent = "Saved";
				bookmarkBtn.disabled = true;
			}
		});

		//Click anywhere on cube to browse
		cube.addEventListener("click", function(){
			openBrowser(safeName);
		});

		return cube;
	}

	/* ═══════════════════════════════════════
	   INFINITE SCROLL via IntersectionObserver
	   ═══════════════════════════════════════ */
	var observer = new IntersectionObserver(function(entries){
		if(entries[0].isIntersecting && RENDERED < FILTERED.length){
			renderBatch();
		}
	}, { rootMargin: "200px" });

	observer.observe(document.getElementById("sentinel"));

	/* ═══════════════════════════════════════
	   INIT MDS
	   ═══════════════════════════════════════ */
	MDS.init(function(msg){

		if(msg.event == "inited"){

			loadTheme();

			createDB(function(){
				loadAllSites();
			});
		}
	});

</script>

<!-- inject the accent bar color per-cube via a tiny style rule -->
<style>
	.cube::before {
		background: linear-gradient(90deg, var(--_bar, var(--accent)), transparent) !important;
	}
</style>
